# Render blueprint — Precision Shooter backend (FastAPI + PostgreSQL + Redis).
# Connect this repo on https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: precision-shooter-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "True"           # keeps debug_otp in responses so demo signups work without SMS/email
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: precision-shooter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: precision-shooter-redis
          type: keyvalue
          property: connectionString

  - type: keyvalue
    name: precision-shooter-redis
    plan: free
    ipAllowList: []             # only reachable from Render services

databases:
  - name: precision-shooter-db
    plan: free
    databaseName: precision_shooter
    user: ps_app
